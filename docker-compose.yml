services:
  openclaw:
    image: ghcr.io/openclaw/openclaw:latest
    ports:
      - "18789:18789"
    volumes:
      - ./openclaw-data:/home/node/.openclaw
      - ./skill/SKILL.docker.md:/home/node/.openclaw/skills/mc-agent/SKILL.md:ro
    restart: unless-stopped

  mc-agent:
    image: mc-agent:latest
    env_file: .env
    environment:
      OPENCLAW_GATEWAY_URL: ws://openclaw:18789
    depends_on:
      - openclaw
    volumes:
      - .:/app
      - /app/node_modules
      - ./auth-cache:/app/auth-cache
    restart: unless-stopped
